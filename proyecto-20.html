<!--
Crea una tabla de personas, la tabla de personas debera tener 3 columnas, nombre, apellido y edad-
deben tener un encabezado de dichas columnas, si una persona no tiene la edad añadida, la edad debe ocupar 2 filas
la tabla debe tener un resumen odescripcion
-->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto 20 HTML</title>
</head>
<body>
    <h1>Tabla de Usuarios</h1>

    <table summary="Usuarios registrados" border="1">
        <tr>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Edad</th>
        </tr>

        <tr>
            <td>Victor</td>
            <td>Bazan</td>
            <td rowspan="2">40</td>
        </tr>

        <tr>
            <td>Tato</td>
            <td>Linares</td>
        </tr>

        <tr>
            <td>Sebastian</td>
            <td colspan="2">Benites</td>
        </tr>
    </table>

    
</body>
</html>
