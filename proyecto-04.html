<!--
(CREA UN ELEMENTO PRINCIPAL) (CON UNA SECCION) QUE CONTENGA UN ARTICULO,
EL ARTICULO DEBE TENER UN TITULO, SUBTITULO Y UN PARRAFO
-->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto 04 HTML</title>
</head>
<body>

    <main>
        <section>
            <article>
                <h2>Título del Artículo</h2>
                <h3>Subtítulo del Artículo</h3>
                <p>Este es el párrafo del artículo donde se desarrolla el contenido principal relacionado
                    con el título y subtítulo.</p>
            </article>
        </section>
    </main>
    
</body>
</html>
