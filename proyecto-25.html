<!--
Crea un parrafo que permita introducir muchos espacios, en ese texto debera haber una abreviatura
y una parte del texto debe estar invertido.
-->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto 25 HTML</title>
</head>
<body>
    <pre>
    Este es un párrafo <bdo dir="rtl">permite introducir</bdo muchos espacios.
    <abbr title="hay una abreviatura"> que vi.</abbr>
    </pre>
    
</body>
</html>
