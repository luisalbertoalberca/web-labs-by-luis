<!--
Enunciado:
CREA UN COMENTARIO DE CODIGO EXPLICANDO LAS ETIQUETAS USADAS EN EL PROYECTO ANTERIOR
-->

<!--Define la version de html que vamos a usar-->
<!DOCTYPE HTML>

<!--Abrimos nuestra pagina web y definimos el idioma-->
<html lang="es">

<!--Dentro definimos los metadatos y la informacion no visible en la web-->
    <head>

        <!--Establece la codificacion de caracteres correcta para el castellano-->
        <meta charset="UTF-8">

        <!--Ajusta el diseño de nuestra web al tamaños de la pantalla del dispositivo-->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!--Titulado de la web que se vera en google y en la pestaña del navegador-->
        <title>Proyecto 03 HTML</title>
    </head>
    
    <!--Abrimos el cuerpo de la web, lo que vera el usuario en el navegador-->
    <body>
        <!--
        <html>: Define el inicio del documento HTML y establece el idioma como español.
        <head>: Contiene metadatos sobre el documento, como la codificación de caracteres y el título.
        <meta charset="UTF-8">: Especifica la codificación de caracteres utilizada en el documento.
        <meta name="viewport" content="width=device-width, initial-scale=1.0">: Hace que el diseño sea responsivo en dispositivos móviles.
        <title>: Define el título del documento que aparece en la pestaña del navegador.
        <body>: Contiene el contenido visible de la página web.
        -->

        <!--Crea la cabecera visible en la web-->
        <header>

            <!--Encabezado o titular principal de la web-->
            <h1>Bienvenidos a Mi Página Web</h1>

            <!--crea un parrafo en HTML-->
            <p>Esta es una introducción a mi sitio web donde comparto información interesante.</p>
        </header>
    </body>
